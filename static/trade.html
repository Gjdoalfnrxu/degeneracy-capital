<!DOCTYPE html>
<html lang="en">
<head>
  <script>if(localStorage.getItem('degcap_theme')==='stealth'){document.documentElement.classList.add('stealth');}</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Degeneracy Capital — Trade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a6fc4; --sky: #5bbfff; --yellow: #ffdd57;
      --green: #4ecb71; --red: #ff5252; --orange: #ff9800;
      --bg: #0e3d6b; --surface: #1255a0; --card: #1a6fc4;
      --text: #ffffff; --muted: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 15% 10%, rgba(91,191,255,0.12) 0%, transparent 50%),
        radial-gradient(circle at 85% 80%, rgba(78,203,113,0.08) 0%, transparent 50%);
    }

    header {
      background: linear-gradient(135deg, #0a2d52 0%, #1255a0 100%);
      border-bottom: 3px solid var(--sky);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: var(--yellow);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .logo span { color: var(--sky); }

    nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      margin-left: 1rem;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      transition: all 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.15); color: #fff; }
    nav a.active { background: var(--yellow); color: #0a2d52; }

    .container { max-width: 620px; margin: 0 auto; padding: 2rem; }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      color: var(--yellow);
      margin-bottom: 0.3rem;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }

    .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }

    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(8px);
    }

    .form-group { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--sky);
      margin-bottom: 0.5rem;
      font-weight: 800;
    }

    input, select {
      width: 100%;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(91,191,255,0.2);
    }

    select option { background: #0e3d6b; }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .action-btn {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 800;
      padding: 0.65rem 0.5rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.15s;
      text-align: center;
    }

    .action-btn:hover { border-color: var(--sky); color: #fff; background: rgba(91,191,255,0.15); }
    .action-btn.selected-buy    { border-color: var(--green); color: var(--green); background: rgba(78,203,113,0.15); }
    .action-btn.selected-sell   { border-color: var(--red); color: var(--red); background: rgba(255,82,82,0.15); }
    .action-btn.selected-short  { border-color: var(--red); color: var(--red); background: rgba(255,82,82,0.15); }
    .action-btn.selected-cover  { border-color: var(--green); color: var(--green); background: rgba(78,203,113,0.15); }
    .action-btn.selected-call   { border-color: var(--sky); color: var(--sky); background: rgba(91,191,255,0.15); }
    .action-btn.selected-put    { border-color: var(--orange); color: var(--orange); background: rgba(255,152,0,0.15); }

    .options-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .submit-btn {
      width: 100%;
      background: var(--yellow);
      color: #0a2d52;
      border: none;
      border-radius: 8px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      font-weight: 400;
      padding: 0.9rem;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 12px rgba(255,221,87,0.3);
    }
    .submit-btn:hover:not(:disabled) { background: #ffe97a; box-shadow: 0 6px 20px rgba(255,221,87,0.4); transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .result {
      margin-top: 1.2rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      display: none;
    }
    .result.success { background: rgba(78,203,113,0.15); border: 1px solid var(--green); color: var(--green); }
    .result.error   { background: rgba(255,82,82,0.15); border: 1px solid var(--red); color: var(--red); }

    .price-preview {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 2.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .price-preview .price { color: var(--yellow); font-family: 'Fredoka One', cursive; font-size: 1.2rem; }

    .quick-tickers {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }
    .quick-ticker {
      background: rgba(91,191,255,0.1);
      border: 1px solid rgba(91,191,255,0.2);
      border-radius: 999px;
      color: var(--sky);
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .quick-ticker:hover { background: rgba(91,191,255,0.25); border-color: var(--sky); }

    footer {
      background: #0a2d52;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 1.5rem 2rem;
      text-align: center;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      margin-top: 4rem;
    }

    @media (max-width: 600px) {
      header { padding: 0.75rem 1rem; flex-wrap: wrap; gap: 0.5rem; }
      .logo { font-size: 1.3rem; }
      nav a { margin-left: 0.4rem; padding: 0.3rem 0.5rem; font-size: 0.75rem; }
      #stealthBtn { margin-left: 0.4rem; padding: 0.2rem 0.5rem; font-size: 0.7rem; }
      .container { padding: 1rem; }
      h1 { font-size: 1.6rem; }
    }

    html.stealth body { background: #111 !important; color: #e0e0e0 !important; font-family: Consolas,'Courier New',monospace !important; background-image: none !important; }
    html.stealth header { background: #1a1a1a !important; border-bottom: 1px solid #333 !important; box-shadow: none !important; }
    html.stealth .logo { font-family: Consolas,'Courier New',monospace !important; color: #e0e0e0 !important; font-size: 1rem !important; text-shadow: none !important; letter-spacing: 0.1em !important; }
    html.stealth .logo span { color: #f5a623 !important; }
    html.stealth nav a { border-radius: 0 !important; padding: 0.3rem 0.6rem !important; color: #888 !important; font-size: 0.8rem !important; }
    html.stealth nav a.active, html.stealth nav a:hover { background: none !important; color: #f5a623 !important; border-bottom: 1px solid #f5a623 !important; }
    html.stealth h1, html.stealth h2 { font-family: Consolas,'Courier New',monospace !important; color: #e0e0e0 !important; text-shadow: none !important; }
    html.stealth .total-value, html.stealth .stat-value, html.stealth .price { font-family: Consolas,'Courier New',monospace !important; color: #f5a623 !important; text-shadow: none !important; }
    html.stealth .card, html.stealth .price-card, html.stealth .leaderboard tbody tr { background: #1a1a1a !important; border-color: #333 !important; border-radius: 0 !important; box-shadow: none !important; }
    html.stealth .submit-btn { background: #333 !important; color: #e0e0e0 !important; border-radius: 0 !important; font-family: Consolas,'Courier New',monospace !important; box-shadow: none !important; }
    html.stealth input, html.stealth select { background: #0a0a0a !important; border-color: #333 !important; border-radius: 0 !important; color: #e0e0e0 !important; font-family: Consolas,'Courier New',monospace !important; }
    html.stealth footer { background: #0a0a0a !important; border-color: #222 !important; }
    html.stealth .pnl-positive { color: #00cc44 !important; }
    html.stealth .pnl-negative { color: #cc3333 !important; }
    html.stealth .ticker { color: #f5a623 !important; }
    html.stealth .positions-badge { background: #1a1a1a !important; border-color: #444 !important; color: #888 !important; border-radius: 0 !important; }
    html.stealth .rank-1 { color: #f5a623 !important; text-shadow: none !important; }
    html.stealth .section-label { font-family: Consolas,'Courier New',monospace !important; color: #f5a623 !important; text-shadow: none !important; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Degeneracy<span>Capital</span></div>
    <nav>
      <a href="/">Leaderboard</a>
      <a href="/trade" class="active">Trade</a>
      <a href="/prices">Prices</a>
      <a href="/charts">Charts</a>
      <button id="stealthBtn" onclick="toggleStealth()" style="background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);font-family:inherit;font-size:0.75rem;padding:0.3rem 0.7rem;border-radius:20px;cursor:pointer;margin-left:1rem;">👁 stealth</button>
    </nav>
  </header>

  <div class="container">
    <h1>Execute Trade</h1>
    <div class="subtitle">Paper money, real degenerate energy.</div>

    <div class="card">
      <div class="form-group">
        <label>Player</label>
        <select id="player">
          <option value="">Select player...</option>
        </select>
      </div>

      <div class="form-group">
        <label>Ticker</label>
        <input id="ticker" type="text" placeholder="e.g. NVDA, BTC-USD" autocomplete="off" />
        <div class="quick-tickers" id="quickTickers"></div>
      </div>

      <div class="form-group">
        <label>Current Price</label>
        <div class="price-preview" id="pricePreview">
          <span>Enter a ticker to see price</span>
        </div>
      </div>

      <div class="form-group">
        <label>Action</label>
        <div class="action-grid" id="actionGrid">
          <button class="action-btn" data-action="buy">📈 Buy</button>
          <button class="action-btn" data-action="sell">📉 Sell</button>
          <button class="action-btn" data-action="short">🐻 Short</button>
          <button class="action-btn" data-action="cover">🤝 Cover</button>
          <button class="action-btn" data-action="call">☎️ Call</button>
          <button class="action-btn" data-action="put">🪃 Put</button>
        </div>
      </div>

      <div class="form-group">
        <label>Quantity <span id="qtyHint" style="color:var(--mued);font-weight:600">(shares)</span></label>
        <input id="quantity" type="number" min="0.001" step="any" placeholder="100" />
      </div>

      <div class="options-section" id="optionsSection" style="display:none">
        <div class="row">
          <div class="form-group">
            <label>Strike Price</label>
            <input id="strike" type="number" min="0.01" step="any" placeholder="150.00" />
          </div>
          <div class="form-group">
            <label>Expiry Date</label>
            <input id="expiry" type="date" />
          </div>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="executeTrade()">Execute Trade</button>

      <div class="result" id="result"></div>
    </div>
  </div>

  <footer>Degeneracy Capital · Not financial advice · Prices via yfinance</footer>

  <script>
    const WATCHLIST = [
      'FRO','DHT','NAT','XLE','XOM','RTX','GLD','SONY','MSI','AXON',
      'AMBA','NVDA','NTR','MOS','CF','APD','LIN','AAL','DAL','BTC-USD','ETH-USD'
    ];

    let selectedAction = null;
    let priceTimeout = null;

    const params = new URLSearchParams(location.search);
    const prePlayer = params.get('player');

    async function loadPlayers() {
      try {
        const res = await fetch('/api/players');
        const data = await res.json();
        const sel = document.getElementById('player');
        data.players.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p;
          opt.textContent = p;
          if (p === prePlayer) opt.selected = true;
          sel.appendChild(opt);
        });
      } catch (e) { console.error(e); }
    }

    const qtDiv = document.getElementById('quickTickers');
    WATCHLIST.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'quick-ticker';
      btn.textContent = t;
      btn.onclick = () => {
        document.getElementById('ticker').value = t;
        fetchPrice(t);
      };
      qtDiv.appendChild(btn);
    });

    document.querySelectorAll('.action-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.action-btn').forEach(b => b.className = 'action-btn');
        const action = btn.dataset.action;
        btn.classList.add(`selected-${action}`);
        selectedAction = action;
        const isOption = action === 'call' || action === 'put';
        document.getElementById('optionsSection').style.display = isOption ? 'block' : 'none';
        const hint = document.getElementById('qtyHint');
        hint.textContent = isOption ? '(contracts · 1 contract = 100 shares)' : '(shares)';
      });
    });

    document.getElementById('ticker').addEventListener('input', e => {
      clearTimeout(priceTimeout);
      const val = e.target.value.trim().toUpperCase();
      if (!val) {
        document.getElementById('pricePreview').innerHTML = '<span>Enter a ticker to see price</span>';
        return;
      }
      priceTimeout = setTimeout(() => fetchPrice(val), 600);
    });

    async function fetchPrice(ticker) {
      const preview = document.getElementById('pricePreview');
      preview.innerHTML = '<span>Fetching...</span>';
      try {
        const res = await fetch(`/api/price/${encodeURIComponent(ticker)}`);
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();
        preview.innerHTML = `<span>${ticker}</span><span class="price">$${data.price.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:4})}</span>`;
      } catch {
        preview.innerHTML = `<span style="color:var(--red)">No price available for ${ticker}</span>`;
      }
    }

    async function executeTrade() {
      const player   = document.getElementById('player').value;
      const ticker   = document.getElementById('ticker').value.trim().toUpperCase();
      const quantity = parseFloat(document.getElementById('quantity').value);
      const strike   = parseFloat(document.getElementById('strike').value) || null;
      const expiry   = document.getElementById('expiry').value || null;
      const btn      = document.getElementById('submitBtn');

      document.getElementById('result').style.display = 'none';

      if (!player) { showResult('error', 'Select a player.'); return; }
      if (!ticker) { showResult('error', 'Enter a ticker.'); return; }
      if (!selectedAction) { showResult('error', 'Select an action.'); return; }
      if (!quantity || quantity <= 0) { showResult('error', 'Enter a valid quantity.'); return; }
      if ((selectedAction === 'call' || selectedAction === 'put') && (!strike || !expiry)) {
        showResult('error', 'Options require strike and expiry.'); return;
      }

      btn.disabled = true;
      btn.textContent = 'Executing...';

      try {
        const body = { player, ticker, action: selectedAction, quantity };
        if (strike) body.strike = strike;
        if (expiry) body.expiry = expiry;

        const res = await fetch('/api/trade', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        if (!res.ok) {
          showResult('error', data.detail || 'Trade failed.');
        } else {
          showResult('success',
            `✓ ${data.action.toUpperCase()} ${data.quantity.toLocaleString()}x ${data.ticker} @ $${data.price.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:4})}`
          );
          document.getElementById('quantity').value = '';
          document.getElementById('strike').value = '';
          document.getElementById('expiry').value = '';
        }
      } catch (e) {
        showResult('error', `Error: ${e.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Execute Trade';
      }
    }

    function showResult(type, msg) {
      const el = document.getElementById('result');
      el.className = `result ${type}`;
      el.textContent = msg;
      el.style.display = 'block';
    }

    loadPlayers();

    function toggleStealth() {
      const stealth = document.documentElement.classList.toggle('stealth');
      localStorage.setItem('degcap_theme', stealth ? 'stealth' : 'blues');
      const btn = document.getElementById('stealthBtn');
      if (btn) btn.textContent = stealth ? '🎨 colour' : '👁 stealth';
      const logo = document.querySelector('.logo');
      if (logo) logo.innerHTML = stealth ? 'DEGCAP <span>ANALYTICS</span>' : 'Degeneracy<span>Capital</span>';
    }
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('stealthBtn');
      const logo = document.querySelector('.logo');
      if (document.documentElement.classList.contains('stealth')) {
        if (btn) btn.textContent = '🎨 colour';
        if (logo) logo.innerHTML = 'DEGCAP <span>ANALYTICS</span>';
      }
    });
  </script>
</body>
</html>
