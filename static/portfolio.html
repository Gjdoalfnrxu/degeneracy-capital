<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Degeneracy Capital — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a6fc4; --sky: #5bbfff; --yellow: #ffdd57;
      --green: #4ecb71; --red: #ff5252; --orange: #ff9800;
      --bg: #0e3d6b; --surface: #1255a0; --card: #1a6fc4;
      --text: #ffffff; --muted: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 15% 10%, rgba(91,191,255,0.12) 0%, transparent 50%),
        radial-gradient(circle at 85% 80%, rgba(78,203,113,0.08) 0%, transparent 50%);
    }

    header {
      background: linear-gradient(135deg, #0a2d52 0%, #1255a0 100%);
      border-bottom: 3px solid var(--sky);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: var(--yellow);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .logo span { color: var(--sky); }

    nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      margin-left: 1rem;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      transition: all 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.15); color: #fff; }
    nav a.active { background: var(--yellow); color: #0a2d52; }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }

    .player-title {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      color: var(--yellow);
      margin-bottom: 0.6rem;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }

    .hero-stats {
      display: flex;
      gap: 2.5rem;
      align-items: flex-end;
    }

    .stat-block { text-align: right; }
    .stat-label { color: var(--sky); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; margin-bottom: 0.3rem; }
    .stat-value { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: var(--yellow); }
    .stat-value.big { font-size: 2.2rem; }

    .pnl-positive { color: var(--green); }
    .pnl-negative { color: var(--red); }
    .pnl-zero     { color: var(--muted); }

    h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      color: var(--sky);
      margin-bottom: 0.75rem;
      margin-top: 2.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 0.7rem;
      color: var(--sky);
      padding: 0.5rem 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 800;
    }
    td {
      padding: 0.9rem 0.75rem;
      font-size: 0.88rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    tbody tr:hover { background: rgba(255,255,255,0.05); }

    .ticker { font-weight: 800; color: var(--sky); font-size: 1rem; }
    .type-badge {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 800;
    }
    .type-long  { background: rgba(78,203,113,0.15); color: var(--green); border: 1px solid rgba(78,203,113,0.3); }
    .type-short { background: rgba(255,82,82,0.15); color: var(--red); border: 1px solid rgba(255,82,82,0.3); }
    .type-call  { background: rgba(91,191,255,0.15); color: var(--sky); border: 1px solid rgba(91,191,255,0.3); }
    .type-put   { background: rgba(255,152,0,0.15); color: var(--orange); border: 1px solid rgba(255,152,0,0.3); }

    .trade-action {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .action-buy, .action-cover { color: var(--green); }
    .action-sell, .action-short { color: var(--red); }
    .action-call { color: var(--sky); }
    .action-put  { color: var(--orange); }

    .empty { color: var(--muted); font-size: 0.85rem; padding: 1.5rem 0.75rem; }

    .trade-time { color: var(--muted); font-size: 0.75rem; }

    .option-detail { color: var(--muted); font-size: 0.7rem; margin-top: 0.2rem; }

    .trade-btn {
      display: inline-block;
      background: var(--yellow);
      color: #0a2d52;
      text-decoration: none;
      padding: 0.6rem 1.4rem;
      border-radius: 20px;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(255,221,87,0.3);
    }
    .trade-btn:hover { background: #ffe97a; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,221,87,0.4); }

    .loading { text-align: center; padding: 4rem; color: var(--muted); font-size: 0.9rem; }
    .error   { text-align: center; padding: 4rem; color: var(--red); font-size: 0.9rem; }

    footer {
      background: #0a2d52;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 1.5rem 2rem;
      text-align: center;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      margin-top: 4rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Degeneracy<span>Capital</span></div>
    <nav>
      <a href="/">Leaderboard</a>
      <a href="/trade">Trade</a>
      <a href="/prices">Prices</a>
      <a href="/charts">Charts</a>
    </nav>
  </header>

  <div class="container">
    <div id="content"><div class="loading">Loading portfolio...</div></div>
  </div>

  <footer>Degeneracy Capital · Not financial advice · Prices via yfinance</footer>

  <script>
    const player = decodeURIComponent(location.pathname.split('/').pop());

    function fmt(n) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 }).format(n);
    }
    function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
    function pnlClass(n) {
      if (n > 0) return 'pnl-positive';
      if (n < 0) return 'pnl-negative';
      return 'pnl-zero';
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function typeLabel(t) {
      return `<span class="type-badge type-${t}">${t}</span>`;
    }

    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso + 'Z');
      return d.toLocaleString();
    }

    async function load() {
      try {
        const res = await fetch(`/api/portfolio/${encodeURIComponent(player)}`);
        if (!res.ok) throw new Error(`Player not found: ${player}`);
        const data = await res.json();
        render(data);
      } catch (e) {
        document.getElementById('content').innerHTML = `<div class="error">Error: ${e.message}</div>`;
      }
    }

    function render(d) {
      const pnlCls = pnlClass(d.total_pnl);
      const sign = d.total_pnl >= 0 ? '+' : '';

      let posRows = '';
      if (!d.positions.length) {
        posRows = `<tr><td colspan="7" class="empty">No open positions.</td></tr>`;
      } else {
        posRows = d.positions.map(p => {
          const cls = pnlClass(p.pnl);
          const s = p.pnl >= 0 ? '+' : '';
          let optDetail = '';
          if (p.position_type === 'call' || p.position_type === 'put') {
            optDetail = `<div class="option-detail">Strike ${fmt(p.strike)} · Exp ${esc(p.expiry)}</div>`;
          }
          const costLabel = (p.position_type === 'call' || p.position_type === 'put') ? 'Premium' : 'Cost Basis';
          return `
            <tr>
              <td><span class="ticker">${esc(p.ticker)}</span></td>
              <td>${typeLabel(p.position_type)}</td>
              <td>${p.quantity.toLocaleString()}</td>
              <td>${fmt(p.current_price)}</td>
              <td>${fmt(p.cost_basis)}<div class="option-detail">${costLabel}</div></td>
              <td>${fmt(p.market_value)}${optDetail}</td>
              <td class="${cls}">${s}${fmt(p.pnl)}<div class="option-detail ${cls}">${fmtPct(p.pnl_pct)}</div></td>
            </tr>
          `;
        }).join('');
      }

      let tradeRows = '';
      if (!d.trades.length) {
        tradeRows = `<tr><td colspan="5" class="empty">No trades yet.</td></tr>`;
      } else {
        tradeRows = d.trades.map(t => {
          const aCls = `action-${t.action}`;
          return `
            <tr>
              <td class="trade-time">${fmtTime(t.timestamp)}</td>
              <td><span class="ticker" style="font-size:0.9rem">${esc(t.ticker)}</span></td>
              <td><span class="trade-action ${aCls}">${esc(t.action)}</span></td>
              <td>${Number(t.quantity).toLocaleString()}</td>
              <td>${fmt(t.price)}</td>
            </tr>
          `;
        }).join('');
      }

      document.getElementById('content').innerHTML = `
        <div class="hero">
          <div>
            <div class="player-title">${esc(player)}</div>
            <a href="/trade?player=${encodeURIComponent(player)}" class="trade-btn">+ New Trade</a>
          </div>
          <div class="hero-stats">
            <div class="stat-block">
              <div class="stat-label">Cash</div>
              <div class="stat-value">${fmt(d.cash)}</div>
            </div>
            <div class="stat-block">
              <div class="stat-label">P&amp;L</div>
              <div class="stat-value ${pnlCls}">${sign}${fmt(d.total_pnl)}</div>
            </div>
            <div class="stat-block">
              <div class="stat-label">Total Value</div>
              <div class="stat-value big">${fmt(d.total_value)}</div>
            </div>
          </div>
        </div>

        <h2>Open Positions</h2>
        <table>
          <thead>
            <tr>
              <th>Ticker</th><th>Type</th><th>Qty</th>
              <th>Current Price</th><th>Cost</th><th>Market Value</th><th>P&amp;L</th>
            </tr>
          </thead>
          <tbody>${posRows}</tbody>
        </table>

        <h2>Recent Trades (last 50)</h2>
        <table>
          <thead>
            <tr>
              <th>Time (UTC)</th><th>Ticker</th><th>Action</th><th>Qty</th><th>Price</th>
            </tr>
          </thead>
          <tbody>${tradeRows}</tbody>
        </table>
      `;
    }

    load();
    setInterval(load, 2 * 60 * 1000);
  </script>
</body>
</html>
