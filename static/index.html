<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Degeneracy Capital — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a6fc4; --sky: #5bbfff; --yellow: #ffdd57;
      --green: #4ecb71; --red: #ff5252; --orange: #ff9800;
      --bg: #0e3d6b; --surface: #1255a0; --card: #1a6fc4;
      --text: #ffffff; --muted: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 15% 10%, rgba(91,191,255,0.12) 0%, transparent 50%),
        radial-gradient(circle at 85% 80%, rgba(78,203,113,0.08) 0%, transparent 50%);
    }

    header {
      background: linear-gradient(135deg, #0a2d52 0%, #1255a0 100%);
      border-bottom: 3px solid var(--sky);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: var(--yellow);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .logo span { color: var(--sky); }

    nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      margin-left: 1rem;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      transition: all 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.15); color: #fff; }
    nav a.active { background: var(--yellow); color: #0a2d52; }

    .container { max-width: 960px; margin: 0 auto; padding: 2rem; }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      color: var(--yellow);
      margin-bottom: 0.3rem;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }

    .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }

    .refresh-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .refresh-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.7);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

    .last-updated { color: var(--muted); font-size: 0.78rem; }

    .leaderboard { width: 100%; border-collapse: collapse; }

    .leaderboard thead tr { border-bottom: 2px solid rgba(91,191,255,0.3); }

    .leaderboard th {
      text-align: left;
      font-size: 0.72rem;
      color: var(--sky);
      padding: 0.6rem 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
    }

    .leaderboard tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.15s;
      cursor: pointer;
    }
    .leaderboard tbody tr:hover { background: rgba(255,255,255,0.07); }

    .leaderboard td { padding: 1.1rem 1rem; font-size: 0.9rem; }

    .rank { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: rgba(255,255,255,0.2); width: 3.5rem; }
    .rank-1 { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.5); }
    .rank-2 { color: #c0c0c0; }
    .rank-3 { color: #cd7f32; }

    .player-name { font-weight: 800; font-size: 1.1rem; color: #fff; }

    .total-value { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: var(--yellow); }

    .pnl-positive { color: var(--green); }
    .pnl-negative { color: var(--red); }
    .pnl-zero     { color: var(--muted); }

    .pnl-amount { font-size: 1rem; font-weight: 800; }
    .pnl-pct    { font-size: 0.75rem; margin-top: 0.15rem; opacity: 0.8; }

    .cash-col { color: var(--muted); font-size: 0.85rem; }

    .positions-badge {
      background: rgba(91,191,255,0.2);
      color: var(--sky);
      border: 1px solid rgba(91,191,255,0.3);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .loading { text-align: center; padding: 4rem; color: var(--muted); font-size: 0.9rem; }
    .error   { text-align: center; padding: 4rem; color: var(--red); font-size: 0.9rem; }

    footer {
      background: #0a2d52;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 1.5rem 2rem;
      text-align: center;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      margin-top: 4rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Degeneracy<span>Capital</span></div>
    <nav>
      <a href="/" class="active">Leaderboard</a>
      <a href="/trade">Trade</a>
      <a href="/prices">Prices</a>
      <a href="/charts">Charts</a>
    </nav>
  </header>

  <div class="container">
    <h1>Leaderboard</h1>
    <div class="subtitle">Starting capital: $1,000,000 · Paper trading only · Prices refresh every 15 min</div>

    <div class="refresh-bar">
      <button class="refresh-btn" onclick="load()">↻ Refresh</button>
      <span class="last-updated" id="lastUpdated"></span>
    </div>

    <div id="content">
      <div class="loading">Loading positions...</div>
    </div>
  </div>

  <footer>Degeneracy Capital · Not financial advice · Prices via yfinance</footer>

  <script>
    function fmt(n) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 }).format(n);
    }
    function fmtPct(n) {
      return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    }
    function pnlClass(n) {
      if (n > 0) return 'pnl-positive';
      if (n < 0) return 'pnl-negative';
      return 'pnl-zero';
    }

    async function load() {
      try {
        const res = await fetch('/api/leaderboard');
        if (!res.ok) throw new Error('Failed to load leaderboard');
        const data = await res.json();
        render(data);
        document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById('content').innerHTML = `<div class="error">Error: ${e.message}</div>`;
      }
    }

    function render(data) {
      if (!data.length) {
        document.getElementById('content').innerHTML = '<div class="loading">No players found.</div>';
        return;
      }

      let rows = data.map(p => {
        const rankClass = p.rank <= 3 ? `rank-${p.rank}` : '';
        const cls = pnlClass(p.total_pnl);
        const sign = p.total_pnl >= 0 ? '+' : '';
        return `
          <tr onclick="location.href='/portfolio/${encodeURIComponent(p.player)}'">
            <td class="rank ${rankClass}">#${p.rank}</td>
            <td><div class="player-name">${escHtml(p.player)}</div></td>
            <td><div class="total-value">${fmt(p.total_value)}</div></td>
            <td>
              <div class="pnl-amount ${cls}">${sign}${fmt(p.total_pnl)}</div>
              <div class="pnl-pct ${cls}">${fmtPct(p.total_pnl_pct)}</div>
            </td>
            <td class="cash-col">${fmt(p.cash)}</td>
            <td><span class="positions-badge">${p.position_count} pos</span></td>
          </tr>
        `;
      }).join('');

      document.getElementById('content').innerHTML = `
        <table class="leaderboard">
          <thead>
            <tr>
              <th>#</th><th>Player</th><th>Total Value</th>
              <th>P&amp;L</th><th>Cash</th><th>Positions</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    load();
    setInterval(load, 2 * 60 * 1000);
  </script>
</body>
</html>
