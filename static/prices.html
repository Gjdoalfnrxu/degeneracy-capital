<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Degeneracy Capital — Prices</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a6fc4; --sky: #5bbfff; --yellow: #ffdd57;
      --green: #4ecb71; --red: #ff5252; --orange: #ff9800;
      --bg: #0e3d6b; --surface: #1255a0; --card: #1a6fc4;
      --text: #ffffff; --muted: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 15% 10%, rgba(91,191,255,0.12) 0%, transparent 50%),
        radial-gradient(circle at 85% 80%, rgba(78,203,113,0.08) 0%, transparent 50%);
    }

    header {
      background: linear-gradient(135deg, #0a2d52 0%, #1255a0 100%);
      border-bottom: 3px solid var(--sky);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: var(--yellow);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .logo span { color: var(--sky); }

    nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      margin-left: 1rem;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      transition: all 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.15); color: #fff; }
    nav a.active { background: var(--yellow); color: #0a2d52; }

    .container { max-width: 860px; margin: 0 auto; padding: 2rem; }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      color: var(--yellow);
      margin-bottom: 0.3rem;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }

    .refresh-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .refresh-btn, .trigger-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.7);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
    .trigger-btn:hover { background: rgba(255,152,0,0.2); border-color: var(--orange); color: var(--orange); }

    .last-updated { color: var(--muted); font-size: 0.78rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
    }

    .price-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
    }
    .price-card:hover { background: rgba(255,255,255,0.12); border-color: var(--sky); transform: translateY(-2px); }

    .ticker {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--sky);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
    }

    .price {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: var(--yellow);
    }

    .updated-at {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .stale { border-color: rgba(255,152,0,0.3); }
    .stale .ticker { color: var(--orange); }
    .stale .price  { color: rgba(255,221,87,0.5); }

    .no-price {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 4rem;
      text-align: center;
    }

    footer {
      background: #0a2d52;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 1.5rem 2rem;
      text-align: center;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      margin-top: 4rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Degeneracy<span>Capital</span></div>
    <nav>
      <a href="/">Leaderboard</a>
      <a href="/trade">Trade</a>
      <a href="/prices" class="active">Prices</a>
      <a href="/charts">Charts</a>
    </nav>
  </header>

  <div class="container">
    <h1>Prices</h1>
    <div class="subtitle">Cached prices · refreshed every 15 minutes</div>

    <div class="refresh-bar">
      <button class="refresh-btn" onclick="load()">↻ Refresh display</button>
      <button class="trigger-btn" onclick="triggerRefresh()">⚡ Force price refresh</button>
      <span class="last-updated" id="lastUpdated"></span>
    </div>

    <div id="content"><div class="no-price">Loading prices...</div></div>
  </div>

  <footer>Degeneracy Capital · Not financial advice · Prices via yfinance</footer>

  <script>
    function fmtPrice(p) {
      if (p >= 1000) return '$' + p.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
      if (p >= 1)    return '$' + p.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:4});
      return '$' + p.toFixed(6);
    }

    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso + 'Z');
      const mins = Math.round((Date.now() - d.getTime()) / 60000);
      if (mins < 2) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.round(mins / 60);
      return `${hrs}h ago`;
    }

    function isStale(iso) {
      if (!iso) return true;
      const d = new Date(iso + 'Z');
      return (Date.now() - d.getTime()) > 20 * 60 * 1000;
    }

    const WATCHLIST = [
      'FRO','DHT','NAT','XLE','XOM','RTX','GLD','SONY','MSI','AXON',
      'AMBA','NVDA','NTR','MOS','CF','APD','LIN','AAL','DAL','BTC-USD','ETH-USD'
    ];

    async function load() {
      try {
        const res = await fetch('/api/prices');
        const data = await res.json();

        const all = [...new Set([...WATCHLIST, ...Object.keys(data)])];

        if (!all.length) {
          document.getElementById('content').innerHTML = '<div class="no-price">No prices cached yet. Prices refresh in the background.</div>';
          return;
        }

        const cards = all.map(ticker => {
          const entry = data[ticker];
          if (!entry) {
            return `
              <div class="price-card stale">
                <div class="ticker">${ticker}</div>
                <div class="price" style="color:rgba(255,255,255,0.2)">—</div>
                <div class="updated-at">not yet fetched</div>
              </div>
            `;
          }
          const stale = isStale(entry.updated_at);
          return `
            <a href="/trade?player=&ticker=${encodeURIComponent(ticker)}" class="price-card ${stale ? 'stale' : ''}">
              <div class="ticker">${ticker}</div>
              <div class="price">${fmtPrice(entry.price)}</div>
              <div class="updated-at">${fmtTime(entry.updated_at)}${stale ? ' ⚠' : ''}</div>
            </a>
          `;
        }).join('');

        document.getElementById('content').innerHTML = `<div class="grid">${cards}</div>`;
        document.getElementById('lastUpdated').textContent = 'Displayed at ' + new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById('content').innerHTML = `<div class="no-price" style="color:var(--red)">Error: ${e.message}</div>`;
      }
    }

    async function triggerRefresh() {
      const btn = document.querySelector('.trigger-btn');
      btn.textContent = '⏳ Refreshing...';
      btn.disabled = true;
      try {
        await fetch('/api/refresh_prices', { method: 'POST' });
        btn.textContent = '✓ Refresh triggered (15s)';
        setTimeout(() => { btn.textContent = '⚡ Force price refresh'; btn.disabled = false; }, 15000);
        setTimeout(load, 5000);
      } catch {
        btn.textContent = '⚡ Force price refresh';
        btn.disabled = false;
      }
    }

    load();
    setInterval(load, 60 * 1000);
  </script>
</body>
</html>
