version: "3.8"

volumes:
  degcap_data:

services:
  degcap:
    build: .
    container_name: degcap
    restart: unless-stopped
    volumes:
      - degcap_data:/data
    environment:
      - DB_PATH=/data/degcap.db
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - POLL_INTERVAL=900
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.degcap.rule=Host(`capital.cain.rocks`)"
      - "traefik.http.routers.degcap.tls.certresolver=letsencrypt"
      - "traefik.http.routers.degcap.tls.domains[0].main=cain.rocks"
      - "traefik.http.routers.degcap.tls.domains[0].sans=*.cain.rocks"
      - "traefik.http.services.degcap.loadbalancer.server.port=8420"
